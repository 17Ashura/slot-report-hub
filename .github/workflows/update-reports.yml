name: Update Reports Index

on:
  push:
    branches:
      - main
    paths:
      - 'reports/*.html'
      - 'index.html'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug — show file tree
        run: |
          echo "=== Repository root ==="
          ls -la
          echo "=== reports/ folder ==="
          ls -la reports/ 2>/dev/null || echo "(reports/ folder not found)"

      - name: Generate reports.json from HTML files
        run: |
          node - <<'JSEOF'
          const fs = require('fs');
          const dir = 'reports';

          if (!fs.existsSync(dir)) {
            console.log('reports/ folder not found. Writing empty reports.json.');
            fs.writeFileSync('reports.json', JSON.stringify({ updated: new Date().toISOString().slice(0,10), reports: [] }, null, 2) + '\n');
            process.exit(0);
          }

          function extractTitle(html, filename) {
            const m = html.match(/<title[^>]*>([^<]+)<\/title>/i);
            return m ? m[1].trim() : filename;
          }

          function extractStatus(html) {
            const m = html.match(/class=["']status-badge["'][^>]*>([\s\S]*?)<\/div>/i);
            if (!m) return 'complete';
            const text = m[1].replace(/<[^>]+>/g, '').toUpperCase();
            if (text.includes('WIP') || text.includes('IN PROGRESS')) return 'wip';
            if (text.includes('REVIEW'))                               return 'review';
            if (text.includes('FIXED') || text.includes('COMPLETE') || text.includes('DONE')) return 'complete';
            return 'new';
          }

          function extractIssues(html) {
            const count = p => (html.match(new RegExp(p, 'g')) || []).length;
            return {
              critical: count('class=["\']issue-tag tag-danger["\']'),
              warn:     count('class=["\']issue-tag tag-warn["\']'),
              future:   count('class=["\']issue-tag tag-good["\']'),
            };
          }

          function extractDesc(html) {
            const subM = html.match(/class=["']header-sub["'][^>]*>([\s\S]*?)<\/div>/i);
            if (subM) {
              const text = subM[1].replace(/<[^>]+>/g, '').trim();
              if (text) return text.length > 80 ? text.slice(0, 80) + '...' : text;
            }
            const callM = html.match(/class=["']callout good["'][^>]*>([\s\S]*?)<\/div>/i);
            if (callM) {
              const text = callM[1].replace(/<[^>]+>/g, '').trim();
              if (text) return text.length > 80 ? text.slice(0, 80) + '...' : text;
            }
            return '';
          }

          function statusToTags(status, issues) {
            const tags = [];
            if (status === 'complete') tags.push('COMPLETE');
            if (status === 'review')   tags.push('REVIEW');
            if (status === 'wip')      tags.push('WIP');
            if (status === 'new')      tags.push('NEW');
            if (issues.critical === 0 && status === 'complete') tags.push('FINAL');
            return tags;
          }

          const files = fs.readdirSync(dir).filter(f => f.endsWith('.html')).sort();
          console.log('Found ' + files.length + ' HTML file(s) in ' + dir + '/');
          files.forEach(f => console.log('  - ' + f));

          let existingMap = {};
          if (fs.existsSync('reports.json')) {
            try {
              const data = JSON.parse(fs.readFileSync('reports.json', 'utf8'));
              for (const r of (data.reports || [])) existingMap[r.file] = r;
            } catch(e) { console.warn('Could not parse existing reports.json:', e.message); }
          }

          const reports = files.map((filename, i) => {
            const filePath = dir + '/' + filename;
            let html = '';
            try { html = fs.readFileSync(filePath, 'utf8'); }
            catch(e) { console.error('ERROR reading ' + filePath + ':', e.message); return null; }

            const metaMatch = html.match(/<!--\s*REPORT_META:\s*(\{[\s\S]*?\})\s*-->/);
            if (metaMatch) {
              try {
                const meta = JSON.parse(metaMatch[1]);
                console.log('[META]  ' + filename);
                const s = meta.status || extractStatus(html);
                const iss = meta.issues || extractIssues(html);
                return { id: meta.id || String(i+1).padStart(3,'0'), file: filePath,
                  date: meta.date || new Date().toISOString().slice(0,10),
                  title: meta.title || extractTitle(html, filename),
                  desc: meta.desc || extractDesc(html),
                  status: s, tags: meta.tags || statusToTags(s, iss), issues: iss };
              } catch(e) { console.warn('[WARN]  ' + filename + ': REPORT_META parse failed:', e.message); }
            }

            const status = extractStatus(html);
            const issues = extractIssues(html);
            const dateM  = filename.match(/(\d{4})[_\-]?(\d{2})[_\-]?(\d{2})/);
            const date   = dateM ? dateM[1]+'-'+dateM[2]+'-'+dateM[3]
                                 : (existingMap[filePath] && existingMap[filePath].date) || new Date().toISOString().slice(0,10);

            console.log('[AUTO]  ' + filename + ' -> date:' + date + ' status:' + status +
                        ' critical:' + issues.critical + ' warn:' + issues.warn + ' future:' + issues.future);

            return { id: (existingMap[filePath] && existingMap[filePath].id) || String(i+1).padStart(3,'0'),
              file: filePath, date, title: extractTitle(html, filename),
              desc: extractDesc(html), status, tags: statusToTags(status, issues), issues };
          }).filter(Boolean);

          const output = { updated: new Date().toISOString().slice(0,10), reports };
          fs.writeFileSync('reports.json', JSON.stringify(output, null, 2) + '\n');
          console.log('reports.json updated: ' + reports.length + ' report(s)');
          JSEOF

      - name: Commit and push reports.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports.json
          git diff --cached --quiet \
            && echo "No changes to reports.json" \
            || (git commit -m "chore: update reports.json [skip ci]" && git push)
